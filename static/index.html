<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>grepnavi</title>
<script>
  // Monaco Editor の読み込み元
  // ローカルを使う場合: static/vs/ に Monaco を配置して '/vs' に変更
  var require = {paths: {'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs'}};
</script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
<link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div id="workspace">
  <!-- 左列: 検索UI（上）+ 結果（中）+ 詳細（下） -->
  <div id="pane-left">
    <div id="search-panel">
      <div id="bar-main">
        <div id="q-wrap">
          <input id="q" type="text" placeholder="検索パターン" autocomplete="off" spellcheck="false">
          <button class="srch-btn" id="btn-cs" title="大文字小文字を区別 (Alt+C)">Aa</button>
          <button class="srch-btn" id="btn-wb" title="単語単位で検索 (Alt+W)">ab</button>
          <button class="srch-btn" id="btn-re" title="正規表現 (Alt+R)">.*</button>
        </div>
        <span id="root-chip" title="検索ルートを変更">📁 <span id="root-chip-text">…</span> ▾</span>
        <button id="btn-toggle-sub" title="フィルター (ディレクトリ・glob)">⚙</button>
        <button id="btn-s">検索</button>
        <button class="sec" id="btn-stop" style="display:none">■</button>
      </div>
      <div id="bar-sub">
        <div class="bar-field">
          <div class="bar-field-label">検索ディレクトリ</div>
          <div id="dir-wrap">
            <span id="root-label" title="プロジェクトルート"></span>
            <input id="dir" type="text" placeholder="空=ルート全体" autocomplete="off">
            <button id="dir-clear" title="クリア" style="display:none">✕</button>
            <div id="dir-drop"></div>
          </div>
        </div>
        <div class="bar-field">
          <div class="bar-field-label">含めるファイル <span style="color:#555;font-size:10px">glob例: *.c,*.h</span></div>
          <input id="glob" type="text" placeholder="*.c  /  *.c,*.h  /  空=全ファイル" style="width:100%;box-sizing:border-box">
        </div>
      </div>
    </div>
    <div id="pane-search">
      <div id="search-hdr">
        <span id="sh-title">検索結果</span>
        <span id="sh-over" style="color:#f08"></span>
      </div>
      <div id="filter-bar">
        <input id="filter-input" type="text" placeholder="絞り込み: AND=スペース  OR=|  除外=-word" spellcheck="false">
        <button id="filter-clear" title="クリア">✕</button>
      </div>
      <div id="results"></div>
    </div>

    <div id="left-resizer"></div>

    <!-- 詳細 -->
    <div id="pane-detail">
      <div id="detail-hdr">詳細</div>
      <div id="detail">
        <div id="no-sel">ノードを選択</div>
      </div>
    </div>
  </div>

  <div id="col-resizer"></div>

  <!-- 右列: ツリー/グラフ（上）+ Monaco（下） -->
  <div id="pane-right">
    <div id="pane-tree">
      <div id="tree-hdr">
        <span id="tree-title">調査グラフ</span>
        <span style="display:flex;gap:4px;align-items:center">
          <span id="tree-count"></span>
          <div id="project-menu-wrap">
            <button id="btn-project-menu">📁 <span id="project-name">無題</span> ▾</button>
            <div id="project-menu">
              <div class="pmenu-item" id="pmenu-open">開く…</div>
              <div class="pmenu-item" id="pmenu-save">保存 <span class="pmenu-hint">Ctrl+S</span></div>
              <div class="pmenu-item" id="pmenu-saveas">名前を付けて保存…</div>
            </div>
          </div>
        </span>
      </div>
      <div id="tree-tabs">
        <div id="tree-tab-list"></div>
        <button id="btn-tree-add" title="ツリーを追加">＋</button>
        <div id="tree-tab-actions">
          <button class="sec" id="btn-view" style="font-size:11px;padding:1px 6px">グラフ</button>
          <button id="btn-clr" style="font-size:11px;padding:1px 6px">消去</button>
        </div>
      </div>
      <div id="drop-root">ここにドロップ → ルートに移動</div>
      <div id="tree"></div>
      <div id="indent-guide"></div>
      <div id="graph-view"></div>
    </div>

    <!-- Peek パネル -->
    <div id="peek">
      <div id="peek-hdr">
        <button id="btn-nav-back" title="前に戻る (Alt+←)" disabled>←</button>
        <button id="btn-nav-fwd"  title="次へ進む (Alt+→)" disabled>→</button>
        <button id="btn-fzf-open" title="ファイルを開く (Ctrl+P)" onclick="openFzf()" style="font-size:11px;padding:1px 6px">📄 開く</button>
        <span class="peek-file" id="peek-file"></span>
        <span style="color:#444;font-size:10px;white-space:nowrap">Ctrl+クリック/F12: 定義ジャンプ</span>
        <span id="ifdef-ui" style="display:none;gap:4px;align-items:center">
          <input id="ifdef-cond" type="text" placeholder="#ifdef 条件: WIN32=1 DEBUG=0"
            style="flex:0 0 200px;background:#1a1a1a;border:1px solid #444;color:#ccc;padding:1px 5px;border-radius:2px;font:11px Consolas,monospace">
          <button id="ifdef-apply" style="font-size:11px;padding:1px 6px">適用</button>
          <button id="ifdef-clear" class="sec" style="font-size:11px;padding:1px 6px">解除</button>
        </span>
        <button id="btn-line-memo-toggle" title="行メモ表示切り替え (Alt+M)" style="font-size:11px;padding:1px 6px">💬 メモ表示</button>
        <button id="peek-open" title="エディタで開く">↗</button>
        <button onclick="closePeek()" title="閉じる">✕</button>
      </div>
      <div id="peek-tabs"></div>
      <div id="peek-body">
        <div id="peek-placeholder">
          <div id="peek-placeholder-inner">
            <div style="font-size:28px;margin-bottom:12px">📄</div>
            <div style="margin-bottom:6px">ファイルを開く</div>
            <div style="color:#555;font-size:11px"><kbd>Ctrl+P</kbd> でファイルを選択</div>
            <div style="color:#555;font-size:11px">検索結果をクリックしてもファイルを開けます</div>
          </div>
        </div>
        <div id="monaco-container"></div>
      </div>
    </div>
  </div>

</div><!-- #workspace -->

<!-- プロジェクト保存/開くモーダル -->
<div id="project-modal">
  <div id="project-modal-box">
    <div id="project-modal-title"></div>
    <input id="project-modal-input" type="text" placeholder="ファイルパス (例: C:\work\myproject.json)" spellcheck="false">
    <div id="project-history"></div>
    <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px">
      <button id="project-modal-ok">OK</button>
      <button class="sec" id="project-modal-cancel">キャンセル</button>
    </div>
  </div>
</div>

<!-- Ctrl+P ファイルクイックオープン -->
<div id="fzf-overlay">
  <div id="fzf-box">
    <div id="fzf-input-wrap">
      <span id="fzf-icon">🔍</span>
      <input id="fzf-input" type="text" placeholder="ファイル名を入力…" autocomplete="off" spellcheck="false">
      <span id="fzf-count"></span>
    </div>
    <div id="fzf-list"></div>
  </div>
</div>

<div id="memo-tooltip"></div>
<div id="level-badge"><span class="lv-arrow"></span><span id="lv-from"></span> → <span id="lv-to" class="lv-num"></span></div>
<div id="preview-popup">
  <div class="pp-header" id="pp-header"></div>
  <pre><code id="pp-code"></code></pre>
</div>
<div id="sb"><span id="st">準備完了</span></div>

<script src="/js/app.js"></script>
</body>
</html>
